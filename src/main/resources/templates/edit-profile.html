<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="/css/edit-profile.css">
</head>
<body>

<div class="edit-container">

    <h1 class="title">Kingdom Quest</h1>

    <h2 class="subtitle">Edit Profile</h2>

    <img th:src="${user.profilePicture}"
         alt="Profile Picture"
         class="profile-preview">

    <form th:action="@{/profile/edit}"
          th:object="${editProfileDTO}"
          method="post">

        <div class="form-group">
            <label for="roleplayName">Roleplay Name</label>
            <input type="text"
                   id="roleplayName"
                   th:field="*{roleplayName}">
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email"
                   id="email"
                   th:field="*{email}">
        </div>

        <div class="form-group">
            <label for="profilePicture">Profile Picture URL</label>
            <input type="text"
                   id="profilePicture"
                   th:field="*{profilePicture}">
        </div>

        <div class="form-group">
            <label for="server">Server</label>
            <select id="server" th:field="*{server}">
                <option value="EUROPE">Europe</option>
                <option value="ASIA_PACIFIC">Asia Pacific</option>
                <option value="AFRICA">Africa</option>
                <option value="NORTH_AMERICA">North America</option>
                <option value="SOUTH_AMERICA">South America</option>
            </select>
        </div>

        <button type="submit" class="save-btn">
            Save Changes
        </button>

    </form>

    <a href="/dashboard" class="back-btn">
        Back to Dashboard
    </a>

</div>

</body>
</html>
