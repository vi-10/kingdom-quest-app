<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Quest</title>
    <link rel="stylesheet" href="/css/quest.css">
</head>
<body>

<div class="container">

    <div class="header">

        <h1>Edit Quest</h1>

        <a href="/admin/quests" class="back-btn">
            Back
        </a>

    </div>

    <form th:action="@{/admin/quests/edit}"
          th:object="${questData}"
          method="post"
          class="quest-form">

        <div class="form-group">

            <label>Select Quest</label>

            <select th:field="*{id}">

                <option th:each="quest : ${quests}"
                        th:value="${quest.id}"
                        th:text="${quest.title}">
                </option>

            </select>

        </div>

        <div class="form-group">

            <label>Quest title</label>

            <input type="text"
                   th:field="*{title}">

            <p class="error"
               th:if="${#fields.hasErrors('title')}"
               th:errors="*{title}">
            </p>

        </div>

        <div class="form-group">

            <label>Description</label>

            <textarea th:field="*{description}">
            </textarea>

            <p class="error"
               th:if="${#fields.hasErrors('description')}"
               th:errors="*{description}">
            </p>

        </div>

        <div class="form-group">

            <label>Required Level</label>

            <input type="number"
                   min="1"
                   th:field="*{requiredLevel}">

            <p class="error"
               th:if="${#fields.hasErrors('requiredLevel')}"
               th:errors="*{requiredLevel}">
            </p>
        </div>

        <div class="form-group">

            <label>Reward XP</label>

            <input type="number"
                   min="0"
                   th:field="*{rewardXp}">

            <p class="error"
               th:if="${#fields.hasErrors('rewardXp')}"
               th:errors="*{rewardXp}">
            </p>
        </div>

        <div class="form-group">

            <label>Reward Gold</label>

            <input type="number"
                   min="0"
                   th:field="*{rewardGold}">

            <p class="error"
               th:if="${#fields.hasErrors('rewardGold')}"
               th:errors="*{rewardGold}">
            </p>
        </div>

        <div class="form-group">
            <label for="questType">Quest type:</label>
            <select id="questType" th:field="*{questType}">
                <option value="">Select type</option>
                <option value="COMBAT">Combat</option>
                <option value="MAGIC">Magic</option>
                <option value="STEALTH">Stealth</option>
                <option value="SUPPORT">Support</option>
            </select>

            <p class="error"
               th:if="${#fields.hasErrors('questType')}"
               th:errors="*{questType}">
            </p>
        </div>

        <button type="submit"
                class="submit-btn">
            Save Changes
        </button>

    </form>

</div>

</body>
</html>
