<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="login-container">

    <h1 class="title">Kingdom Quest</h1>

    <h2 class="form-title">Login</h2>

    <form th:action="@{/login}" th:object="${loginData}" method="post">

        <div class="form-group">
            <label for="username">Username</label>
            <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter username"
                    th:field="*{username}"
                    required>
            <p class="alert-warning" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">Something is wrong.</p>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter password"
                    th:field="*{password}"
                    required>
            <p class="alert-warning" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">Something is wrong.</p>
        </div>

        <button type="submit" class="btn">
            Login
        </button>

    </form>

    <p class="register-text">
        Don't have an account?
        <a href="/register">Register here</a>
    </p>

</div>

</body>
</html>
