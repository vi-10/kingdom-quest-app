<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Quest Result</title>
    <link rel="stylesheet" href="/css/quest-result.css">
</head>
<body>

<div class="result-container">

    <div th:if="${result.success}" class="result success">

        <h1>Quest Completed!</h1>

        <p th:text="${result.message}"></p>

        <a href="/quests" class="btn">Back to Quests</a>
    </div>

    <div th:if="${!result.success}" class="result failure">

        <h1>Quest Failed</h1>

        <p th:text="${result.message}"></p>

        <a href="/quests" class="btn">Try Again</a>
    </div>

</div>

</body>
</html>
